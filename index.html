<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  </head>
  <body class="bg-light">
    <main>
      <div class="container mt-5 mb-5">
        <div class="card shadow p-4">
          <h2 class="text-center fw-bold text-success mb-4 fs-1">
            <i class="bi bi-people-fill"></i> STUDENT INFORMATION
          </h2>

          <div class="d-flex justify-content-end gap-2 mb-3">
            <button id="Add" class="btn btn-primary btn-sm p-3">
              <i class="bi bi-plus"></i> Add New
            </button>

            <button id="Edit" class="btn btn-warning btn-sm p-3 text-white">
              <i class="bi bi-pencil"></i> Edit
            </button>

            <button id="Delete" class="btn btn-danger btn-sm p3">
              <i class="bi bi-x"></i> Remove
            </button>
          </div>
          <table
            class="table table-bordered table-hover text-center align-middle"
          >
            <thead class="table-secondary">
              <tr>
                <th><input id="selectID" type="checkbox" /></th>
                <th class="text-dark">ID</th>
                <th class="text-dark">Full Name</th>
                <th class="text-dark">Sex</th>
                <th class="text-dark">Phone Number</th>
                <th class="text-dark">DOB</th>
                <th class="text-dark">Email</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
    <main>
      <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title">Add New</h5>
            </div>

            <div class="modal-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    id="fullName"
                    placeholder="Enter Full Name"
                    type="text"
                    maxlength="30"
                    class="form-control"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Sex</label>
                  <select id="sex" class="form-select">
                    <option>N/A</option>
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Date of Birth</label>
                  <input id="dob" type="date" class="form-control" />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Email</label>
                  <input
                    id="email"
                    placeholder="Enter Email"
                    type="email"
                    class="form-control"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    id="phone"
                    placeholder="Enter Phone Number"
                    maxlength="10"
                    type="tel"
                    class="form-control"
                  />
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button id="create" class="btn btn-success">
                <i class="bi bi-check"></i> Create
              </button>

              <button class="btn btn-danger" data-bs-dismiss="modal">
                <i class="bi bi-x"></i> Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <main>
      <div class="modal fade" id="EditInf" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-warning text-white">
              <h5 class="modal-title">Edit Information</h5>
            </div>

            <div class="modal-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    id="editFullName"
                    maxlength="30"
                    type="text"
                    class="form-control"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Sex</label>
                  <select id="editSex" class="form-select">
                    <option>N/A</option>
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Date of Birth</label>
                  <input id="editDob" type="date" class="form-control" />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Email</label>
                  <input id="editEmail" type="email" class="form-control" />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    id="editPhone"
                    maxlength="10"
                    type="tel"
                    class="form-control"
                  />
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button id="EditIn" class="btn btn-success">
                <i class="bi bi-check"></i> Edit
              </button>
              <button class="btn btn-danger" data-bs-dismiss="modal">
                <i class="bi bi-x"></i> Close
              </button>
              <h1>hello</h1>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script>
    $(document).ready(function () {
      let selectedRow = null;

      $("#Add").click(function () {
        const modal = new bootstrap.Modal($("#studentModal")[0]);

        modal.show();
      });
      $("#fullName").on("input", function () {
        $(this).val(
          $(this)
            .val()
            .replace(/[^a-zA-Z\s]/g, ""),
        );
      });
      $("#phone").on("input", function () {
        $(this).val(
          $(this)
            .val()
            .replace(/[^0-9]/g, ""),
        );
      });
      $("#Edit").click(function () {
        selectedRow = $("input.row-check:checked").closest("tr");

        if (!selectedRow.length) {
          alert("Please select a student!");
          return;
        }

        $("#editFullName").val(selectedRow.find("td:eq(2)").text());
        $("#editDob").val(selectedRow.find("td:eq(5)").text());
        $("#editSex").val(selectedRow.find("td:eq(3)").text());
        $("#editEmail").val(selectedRow.find("td:eq(6)").text());
        $("#editPhone").val(selectedRow.find("td:eq(4)").text());

        const modal = new bootstrap.Modal($("#EditInf")[0]);
        modal.show();
      });

      $("#create").click(function () {
        var fullName = $("#fullName").val();
        var sex = $("#sex").val();
        var dob = $("#dob").val();
        var email = $("#email").val();
        var phone = $("#phone").val();
        var id = $("tbody tr").length + 1;

        if (!fullName || !sex || !dob || !email || !phone) {
          alert("Please fill all fields!");
          return;
        }
        if (!/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email)) {
          alert("Invalid email format!");
          $("#email").focus();
          return;
        }
        let exists = false;

        $("tbody tr").each(function () {
          let tableEmail = $(this).find("td:eq(6)").text().trim().toLowerCase();

          if (tableEmail === email) {
            exists = true;
            return false;
          }
        });

        if (exists) {
          alert("Email already exists!");
          $("#email").focus();
          return;
        }
        $("tbody tr").each(function () {
          let tablePhone = $(this).find("td:eq(4)").text().trim();

          if (tablePhone === phone) {
            exists = true;
            return false;
          }
        });

        if (exists) {
          alert("Phone number already exists!");
          $("#phone").focus();
          return;
        }

        $("tbody").append(`
      <tr>
        <td><input type="checkbox" class="row-check" /></td>
        <td>${id}</td>
        <td>${fullName}</td>
        <td>${sex}</td>
        <td>${phone}</td>
        <td>${dob}</td>
        <td>${email}</td>
      </tr>
    `);

        bootstrap.Modal.getInstance($("#studentModal")[0]).hide();

        $("#fullName").val("");
        $("#sex").val("N/A");
        $("#phone").val("");
        $("#dob").val("");
        $("#email").val("");
      });

      $("#EditIn").click(function () {
        if (!selectedRow) return;
        let email = $("#editEmail").val().trim().toLowerCase();
        let phone = $("#editPhone").val().trim();

        let exists = false;

        $("tbody tr")
          .not(selectedRow)
          .each(function () {
            let tableEmail = $(this)
              .find("td:eq(6)")
              .text()
              .trim()
              .toLowerCase();

            if (tableEmail === email) {
              exists = true;
              return false;
            }
          });

        if (exists) {
          alert("Email already exists!");
          $("#editEmail").focus();
          return;
        }
        if (!/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email)) {
          alert("Invalid email format!");
          $("#editEmail").focus();
          return;
        }

        $("tbody tr")
          .not(selectedRow)
          .each(function () {
            let tablePhone = $(this).find("td:eq(4)").text().trim();

            if (tablePhone === phone) {
              exists = true;
              return false;
            }
          });

        if (exists) {
          alert("Phone number already exists!");
          $("#editPhone").focus();
          return;
        }

        selectedRow.find("td:eq(2)").text($("#editFullName").val());
        selectedRow.find("td:eq(3)").text($("#editSex").val());
        selectedRow.find("td:eq(4)").text($("#editPhone").val());
        selectedRow.find("td:eq(5)").text($("#editDob").val());
        selectedRow.find("td:eq(6)").text($("#editEmail").val());

        bootstrap.Modal.getInstance($("#EditInf")[0]).hide();
      });

      $("#editFullName").on("input", function () {
        $(this).val(
          $(this)
            .val()
            .replace(/[^a-zA-Z\s]/g, ""),
        );
      });
      $("#editPhone").on("input", function () {
        $(this).val(
          $(this)
            .val()
            .replace(/[^0-9]/g, ""),
        );
      });

      $("#Delete").click(function () {
        selectedRow = $("input.row-check:checked").closest("tr");
        if (!selectedRow.length) {
          alert("no student selected!");
        } else if (selectedRow.length > 1) {
          alert("Do you want to delete these students!");
        } else if (selectedRow.length == 1) {
          alert("Do you want to delete this student?");
        }

        selectedRow.remove();
      });
    });
  </script>
</html>
